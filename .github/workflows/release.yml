name: Build Windows release ZIP

# Triggered by:
#   - pushing a version tag (vX.Y.Z) → cuts a real GitHub Release with the
#     ZIP attached (the artifact operators download).
#   - manual dispatch from the Actions UI → builds a workflow artifact only,
#     useful for testing the packaging script without making a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Need write access to create the GitHub Release and upload the asset.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4
        with:
          # Need full history so we can run git ls-files / git diff-index
          # (the packaging script's dirty-tree check).
          fetch-depth: 0

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(
              grep -E '^version\s*=' pyproject.toml \
                  | head -1 \
                  | sed -E 's/^version\s*=\s*"([^"]+)".*$/\1/'
          )"
          if [[ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} doesn't match pyproject.toml version ${PYPROJECT_VERSION}." >&2
              echo "Bump pyproject.toml version to ${TAG_VERSION} (or re-tag) and push again." >&2
              exit 1
          fi
          echo "Tag matches pyproject version: ${TAG_VERSION}"

      - name: Build the Windows release ZIP
        run: bash scripts/package-windows-release.sh

      - name: Attach ZIP to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          # Auto-write changelog from commits since previous tag.
          generate_release_notes: true
          # Keep prerelease flag in sync with the tag's pep440 marker;
          # action-gh-release defaults this from the tag name itself
          # (anything with -alpha/-beta/-rc → prerelease).

      - name: Upload ZIP as workflow artifact (for testing / dispatch runs)
        uses: actions/upload-artifact@v4
        with:
          name: mario_task-windows
          path: dist/*.zip
          # 14 days is generous for downloading dispatch-built ZIPs;
          # tag builds also persist in the Release indefinitely.
          retention-days: 14
